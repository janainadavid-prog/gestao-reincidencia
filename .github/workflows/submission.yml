name: Processar Submissão

on:
  repository_dispatch:
    types: [reincidencia_submission]

jobs:
  processar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Salvar submissão como JSON
        run: |
          mkdir -p submissions
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          SUPERVISOR=$(echo '${{ github.event.client_payload.supervisor }}' | tr '@.' '_')
          FILENAME="submissions/${TIMESTAMP}_${SUPERVISOR}.json"
          echo '${{ toJson(github.event.client_payload) }}' > "$FILENAME"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Submissão: $FILENAME [skip ci]"
          git push
