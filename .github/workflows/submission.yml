name: Processar Submissão

on:
  repository_dispatch:
    types: [reincidencia_submission]

jobs:
  processar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Salvar submissão como JSON
        run: |
          mkdir -p submissions
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          CAMPANHA="${{ github.event.client_payload.campanha_id }}"
          SUPERVISOR="${{ github.event.client_payload.supervisor }}"
          FILENAME="submissions/${TIMESTAMP}_${CAMPANHA}.json"
          echo '${{ toJson(github.event.client_payload) }}' > "$FILENAME"
          echo "✅ Arquivo salvo: $FILENAME"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add submissions/
          git commit -m "Submissão: $FILENAME [skip ci]"
          git push
